name: Deploy Gondia Today

on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: [self-hosted, gondia-server]

    steps:
      - uses: actions/checkout@v4

      - name: Copy .env
        run: copy C:\gondia\gondia-share\.env .env

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build the website
        run: npm run build

      - name: Restart the live website
        run: pm2 restart gondiatoday-web