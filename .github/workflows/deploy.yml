name: Deploy Gondia Today

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, gondia-server]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy .env
        shell: powershell
        run: |
          Copy-Item "C:\gondia\gondia-share\.env" ".env" -Force

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build the website
        run: npm run build

      - name: Restart the live website
        shell: powershell
        run: |
          npx pm2 restart gondiatoday-web